# ---------------------------------------------------------------------------
# Tmux configuration — generic base
# ---------------------------------------------------------------------------

# True colour & terminal settings
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",screen-256color*:Tc"
set -ga terminal-overrides ",xterm-256color:Tc:RGB"
set -s escape-time 0
set -g extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

# Default shell
set -g default-shell /bin/zsh
set-environment -g PATH "$HOME/.local/bin:$HOME/.bin:$HOME/bin:$PATH"

# Clipboard (OSC52 passthrough for remote copy)
set -g set-clipboard on
set -g allow-passthrough on

set -g mouse on

# Larger scrollback history
set -g history-limit 100000

# Update window titles
set -g set-titles on

# ---------------------------------------------------------------------------
# Prefix: C-a
# ---------------------------------------------------------------------------
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ---------------------------------------------------------------------------
# Appearance
# ---------------------------------------------------------------------------

# Dim inactive panes (catppuccin frappe: base vs mantle)
set -g window-style 'bg=#303446'
set -g window-active-style 'bg=#232634'

# Number windows starting from 1 (0 key is far)
set -g base-index 1
setw -g pane-base-index 1

# Don't rename windows automatically
set -g automatic-rename off

# ---------------------------------------------------------------------------
# Vim-like copy mode
# ---------------------------------------------------------------------------
set-window-option -g mode-keys vi
bind -r ^ last-window

# `v` to start selection, `y` to copy
bind -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection-and-cancel
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# `P` to paste (uppercase — C-p navigates windows)
bind C-P paste-buffer

# ---------------------------------------------------------------------------
# Utility bindings
# ---------------------------------------------------------------------------

# Clear screen
bind C-l send-keys 'C-l'

# Reload config
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Restore default session picker
bind s choose-tree -s

# ---------------------------------------------------------------------------
# TPM plugins
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-cpu'

set -g @catppuccin_flavor "frappe"
set -g @catppuccin_window_status_style "rounded"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set-option -g status-position top

set -g @catppuccin_window_default_text " #W"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_text " #W"

# Initialize TPM (keep at bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# ---------------------------------------------------------------------------
# Sessionizer (C-f)
# ---------------------------------------------------------------------------
bind-key -n C-f if-shell -F "#{>=:#{version},3.2}" "display-popup -E 'tmux-sessionizer'" "neww tmux-sessionizer"
bind-key C-f send-keys C-f
