# Starship prompt configuration
# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

command_timeout = 2000

# show minimal info
format = """$directory$git_branch$git_status$character"""

# Replace the '❯' symbol in the prompt with '➜'
[character]
success_symbol = "❯ "
error_symbol = "❯ "

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

# disable noisy modules
[aws]
disabled = true

[gcloud]
disabled = true

[kubernetes]
disabled = true

[golang]
disabled = true

[java]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true

[python]
disabled = true

[scala]
disabled = true

[ruby]
disabled = true

[directory]
style = "blue bold"
truncate_to_repo = true

[git_branch]
symbol = " "
style = "green"

[git_status]
disabled = true
